<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KrishiMitra - Login</title>
    
    <link rel="preload" as="image" href="assets/farm-background.jpg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { '50': '#f0fdf4', '100': '#dcfce7', '200': '#bbf7d0', '300': '#86efac', '400': '#4ade80', '500': '#22c55e', '600': '#16a34a', '700': '#15803d', '800': '#166534', '900': '#14532d', '950': '#052e16' }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="h-screen w-screen flex items-center justify-center bg-gray-200 dark:bg-gray-900">

    <div class="absolute inset-0 bg-cover bg-center z-0" style="background-image: url('assets/farm-background.jpg');">
        <div class="absolute inset-0 bg-black opacity-50"></div>
    </div>

    <div class="relative z-10 w-full max-w-md p-8 space-y-6 bg-white rounded-xl shadow-2xl dark:bg-gray-800">
        <div class="flex items-center justify-center gap-3">
            <div class="bg-primary-600 p-2 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547a2 2 0 00-.547 1.806l.477 2.387a6 6 0 00.517 3.86l.158.318a6 6 0 00.517 3.86l2.387.477a2 2 0 001.806-.547a2 2 0 00.547-1.806l-.477-2.387a6 6 0 00-.517-3.86l-.158-.318a6 6 0 01-.517-3.86l-.477-2.387zM12 12a6 6 0 01-6-6V2.25a2 2 0 01.547-1.806l.477-2.387a6 6 0 013.86-.517l.318.158a6 6 0 003.86.517l2.387.477a2 2 0 011.806.547a2 2 0 01.547 1.806V6a6 6 0 01-6 6z" /></svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">KrishiMitra Login</h1>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label for="email" class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary-500" required />
            </div>
            <div>
                <label for="password" class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary-500" required />
            </div>

            <div id="errorMessage" class="hidden text-sm text-center text-red-500 font-medium"></div>

            <button type="submit" id="loginButton" class="w-full bg-primary-600 text-white p-2.5 rounded-lg font-semibold hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors duration-200 flex items-center justify-center">
                Login
            </button>
        </form>

        <p class="text-sm text-center text-gray-600 dark:text-gray-400 mt-4">
            Don't have an account?
            <a href="registration.html" class="font-medium text-primary-600 hover:underline dark:text-primary-500">Register here</a>
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize Dark Mode
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }

            const loginForm = document.getElementById('loginForm');
            const errorMessageDiv = document.getElementById('errorMessage');
            const loginButton = document.getElementById('loginButton');

            loginForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                
                // 1. Show loading state
                loginButton.disabled = true;
                loginButton.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Logging in...`;
                errorMessageDiv.classList.add('hidden');

                // 2. Prepare the data
                const email = document.getElementById("email").value.trim();
                const password = document.getElementById("password").value.trim();
                
                // 3. Send data to the backend API
                try {
                    const response = await fetch('http://127.0.0.1:5000/api/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.message || 'An unknown error occurred.');
                    }

                    // 4. Handle successful login
                    sessionStorage.setItem('authToken', data.token);
                    sessionStorage.setItem('loggedInUser', JSON.stringify(data.user));

                    // Redirect based on admin status from backend response
                    if (data.user.isAdmin) {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'user-dashboard.html';
                    }

                } catch (error) {
                    // 5. Handle failed login
                    errorMessageDiv.textContent = error.message;
                    errorMessageDiv.classList.remove('hidden');
                    loginButton.disabled = false;
                    loginButton.innerHTML = 'Login';
                }
            });
        });
    </script>
</body>
</html>
