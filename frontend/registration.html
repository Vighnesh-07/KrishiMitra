<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KrishiMitra - Create Account</title>
    <link rel="preload" as="image" href="assets/farm-background.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { '50': '#f0fdf4', '100': '#dcfce7', '200': '#bbf7d0', '300': '#86efac', '400': '#4ade80', '500': '#22c55e', '600': '#16a34a', '700': '#15803d', '800': '#166534', '900': '#14532d', '950': '#052e16' }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center bg-gray-200 dark:bg-gray-900">

    <div class="absolute inset-0 bg-cover bg-center z-0" style="background-image: url('assets/farm-background.jpg');">
        <div class="absolute inset-0 bg-black opacity-50"></div>
    </div>

    <div class="relative z-10 w-full max-w-lg p-8 space-y-6 bg-white rounded-xl shadow-2xl dark:bg-gray-800">
        <div class="text-center">
             <div class="flex items-center justify-center gap-3 mx-auto mb-4">
                <div class="bg-primary-600 p-2 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547a2 2 0 00-.547 1.806l.477 2.387a6 6 0 00.517 3.86l.158.318a6 6 0 00.517 3.86l2.387.477a2 2 0 001.806-.547a2 2 0 00.547-1.806l-.477-2.387a6 6 0 00-.517-3.86l-.158-.318a6 6 0 01-.517-3.86l-.477-2.387zM12 12a6 6 0 01-6-6V2.25a2 2 0 01.547-1.806l.477-2.387a6 6 0 013.86-.517l.318.158a6 6 0 003.86.517l2.387.477a2 2 0 011.806.547a2 2 0 01.547 1.806V6a6 6 0 01-6 6z" /></svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Create your Account</h1>
            </div>
        </div>
        
        <div id="successMessage" class="hidden text-center p-4">
            <svg class="w-16 h-16 mx-auto text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h2 class="text-2xl font-bold text-gray-800 dark:text-white mt-4">Registration Successful!</h2>
            <p class="text-gray-600 dark:text-gray-300 mt-2">You will be redirected to the login page shortly.</p>
        </div>

        <form id="registrationForm" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="firstName" class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300">First Name</label>
                    <input type="text" id="firstName" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" required />
                </div>
                <div>
                    <label for="lastName" class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300">Last Name</label>
                    <input type="text" id="lastName" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" required />
                </div>
            </div>
            <div>
                <label for="email" class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300">Email Address</label>
                <input type="email" id="email" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" required />
            </div>
             <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="password" class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
                    <input type="password" id="password" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" required 
                           pattern="^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{8,16}$"
                           title="Password must be 8-16 characters and contain at least one uppercase letter, one number, and one special character (!@#$%^&*)." />
                </div>
                 <div>
                    <label for="confirmPassword" class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" required />
                </div>
            </div>
            <div id="password-reqs" class="text-xs text-gray-500 dark:text-gray-400 space-y-1">
                <p id="req-length">▪ 8-16 characters</p>
                <p id="req-capital">▪ At least one uppercase letter</p>
                <p id="req-number">▪ At least one number</p>
                <p id="req-special">▪ At least one special character (!@#$%^&*)</p>
            </div>
            <div>
                <label for="mobileNumber" class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300">Mobile Number</label>
                <input type="tel" id="mobileNumber" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" required 
                       pattern="[0-9]{10}" title="Mobile number must be exactly 10 digits."/>
            </div>
            <div>
                <label for="address" class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300">Address</label>
                <input type="text" id="address" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" required />
            </div>
            
            <div id="errorMessage" class="hidden text-sm text-center text-red-500 font-medium"></div>

            <button type="submit" id="registerButton" class="w-full bg-primary-600 text-white p-2.5 rounded-lg font-semibold flex items-center justify-center">
                Create Account
            </button>
        </form>

        <p id="loginLink" class="text-sm text-center text-gray-600 dark:text-gray-400 mt-4">
            Already have an account?
            <a href="login.html" class="font-medium text-primary-600 hover:underline dark:text-primary-500">Log in here</a>
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }

            const registrationForm = document.getElementById('registrationForm');
            const successMessageDiv = document.getElementById('successMessage');
            const errorMessageDiv = document.getElementById('errorMessage');
            const registerButton = document.getElementById('registerButton');
            const loginLink = document.getElementById('loginLink');
            const passwordInput = document.getElementById('password');
            
            // Password requirements UI elements
            const reqs = {
                length: document.getElementById('req-length'),
                capital: document.getElementById('req-capital'),
                number: document.getElementById('req-number'),
                special: document.getElementById('req-special')
            };

            // Live feedback for password input
            passwordInput.addEventListener('input', () => {
                const value = passwordInput.value;
                const check = (el, condition, text) => {
                    if (condition) {
                        el.classList.add('text-green-500');
                        el.textContent = `✓ ${text}`;
                    } else {
                        el.classList.remove('text-green-500');
                        el.textContent = `▪ ${text}`;
                    }
                };
                check(reqs.length, value.length >= 8 && value.length <= 16, '8-16 characters');
                check(reqs.capital, /[A-Z]/.test(value), 'At least one uppercase letter');
                check(reqs.number, /\d/.test(value), 'At least one number');
                check(reqs.special, /[!@#$%^&*]/.test(value), 'At least one special character (!@#$%^&*)');
            });

            registrationForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                registerButton.disabled = true;
                registerButton.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Registering...`;
                errorMessageDiv.classList.add('hidden');

                const mobileNumber = document.getElementById('mobileNumber').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                // --- Detailed Validation Logic ---
                if (password !== confirmPassword) {
                    showError("Passwords do not match.");
                    return;
                }
                if (password.length < 8 || password.length > 16) {
                    showError("Password must be between 8 and 16 characters.");
                    return;
                }
                if (!/[A-Z]/.test(password)) {
                    showError("Password must contain at least one uppercase letter.");
                    return;
                }
                if (!/\d/.test(password)) {
                    showError("Password must contain at least one number.");
                    return;
                }
                if (!/[!@#$%^&*]/.test(password)) {
                    showError("Password must contain at least one special character (e.g., !@#$%^&*).");
                    return;
                }
                if (!/^\d{10}$/.test(mobileNumber)) {
                    showError("Mobile number must be exactly 10 digits.");
                    return;
                }

                const newUser = {
                    firstName: document.getElementById('firstName').value.trim(),
                    lastName: document.getElementById('lastName').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    password: password,
                    mobileNumber: mobileNumber,
                    address: document.getElementById('address').value.trim()
                };

                try {
                    const response = await fetch('http://127.0.0.1:5000/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newUser)
                    });

                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(data.message || 'An unknown error occurred.');
                    }

                    registrationForm.classList.add('hidden');
                    loginLink.classList.add('hidden');
                    document.getElementById('password-reqs').classList.add('hidden');
                    successMessageDiv.classList.remove('hidden');

                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2500);

                } catch (error) {
                    showError(error.message);
                }
            });

            function showError(message) {
                errorMessageDiv.textContent = message;
                errorMessageDiv.classList.remove('hidden');
                registerButton.disabled = false;
                registerButton.innerHTML = 'Create Account';
            }
        });
    </script>
</body>
</html>
